name: Auto Build & Release APK (Signed)

on:
  workflow_dispatch:
    # No inputs needed explicitly; version is read from source code.

permissions:
  contents: write

jobs:
  release:
    name: Build, Sign, Tag and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      # ---------------------------------------------------------
      # 1. Extract Version Name from build.gradle.kts
      # ---------------------------------------------------------
      - name: Extract Version Name
        id: extract_version
        run: |
          # Reads 'versionName = "x.y.z"' from app/build.gradle.kts
          VERSION_NAME=$(grep 'versionName =' app/build.gradle.kts | awk -F'"' '{print $2}')
          
          if [ -z "$VERSION_NAME" ]; then
            echo "Error: Could not extract versionName from app/build.gradle.kts"
            exit 1
          fi
          
          echo "Detected Version: $VERSION_NAME"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      # ---------------------------------------------------------
      # 2. Decode Keystore from Base64
      # ---------------------------------------------------------
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      # ---------------------------------------------------------
      # 3. Build & Sign (Injecting Signing Config)
      # ---------------------------------------------------------
      - name: Build Signed Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # ---------------------------------------------------------
      # 4. Create Git Tag (Idempotent)
      # ---------------------------------------------------------
      - name: Create and Push Git Tag
        run: |
          TAG="v${{ env.VERSION_NAME }}"
          
          # Check if tag already exists to avoid errors
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping tag creation."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Verify APK outputs
        run: ls -R app/build/outputs/apk

      # ---------------------------------------------------------
      # 5. Create GitHub Release
      # ---------------------------------------------------------
      - name: Create GitHub Release and upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: Release v${{ env.VERSION_NAME }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
